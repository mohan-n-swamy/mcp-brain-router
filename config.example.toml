# mcp-brain-router Configuration Example
#
# DO NOT COMMIT YOUR REAL CONFIG.
# The installer creates ~/.config/mcp-brain-router/config.toml with chmod 0600.
#
# API keys are stored securely (user-read-only, 0600 permissions).
# Never check real keys into git — only this example template.

# DeepSeek API key (for "cheap" complexity tier)
deepseek_key = "sk-xxxxxxxxxxxxx"

# GLM (Zhipu) API key (for "code" complexity tier)
glm_key = "sk-xxxxxxxxxxxxx"

# Codex CLI availability (for "adversarial" complexity tier)
# Set to true only if 'codex' binary is installed and on PATH
codex_enabled = false

# Grok CLI availability (for "grok" complexity tier — xAI Grok 4.5, grok.com OAuth)
# Set to true only if 'grok' binary is installed and on PATH. No API key: grok
# authenticates via `grok login` (grok.com), so there is no grok_key field.
grok_enabled = false

# Headroom proxy base URL (optional)
# If set, routes DeepSeek and GLM through this proxy for token caching/compression
# Leave commented to use direct API calls
# headroom_base_url = "http://localhost:8282"

# Model overrides per complexity tier (optional)
# Overrides the default model for each tier
[model_overrides]
# cheap = "deepseek-v4-flash"   # default
# code = "glm-5.2"               # default
# grok = "grok-4.5"              # default (grok-composer-2.5-fast is the fast variant)
# adversarial = "gpt-5.5"        # current default
# adversarial = "gpt-5.6-sol"    # capability-first candidate; promote after eval

# Ordered candidates for role-based routing. Replace Codex/Anthropic placeholder
# IDs with model IDs accepted by your native clients. The router never calls
# Anthropic; Anthropic candidates return execute_natively=true assignments.
[roles]
thinker = ["sol-model-id", "fable-model-id"]
adversary = ["terra-model-id", "opus-model-id"]
worker = ["glm-5.2", "grok-4.5", "gpt-5.5", "sonnet-model-id"]
# After representative eval promotion: ["glm-5.2", "grok-4.5", "gpt-5.6-sol", "sonnet-model-id"]
simple = ["glm-4.7", "luna-model-id", "haiku-model-id"]
